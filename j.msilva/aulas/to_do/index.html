<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>
    <style>
        body {
            font-family: "Gill Sans";
            background-color: #a5959563;
            padding: 16px;
        }
        h1{
            color: cadetblue;
            text-align: center;
        }
        .input-area{
            flex: block;
            text-align: center;
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
        }
        #tarefaInput{
            padding: 8px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 8px;
            border: cadetblue solid 1px;
        }
        #btnAdicionar{
            padding: 8px 12px;
            border-radius: 8px;
            color: #f2f2f2;
            background-color: cadetblue;
            border: 0px;
            cursor: pointer;
            transition: 0.5s;
        }
        #btnAdicionar:hover {
            background-color: rgb(30, 62, 63);
            color: white;
            transition: 0.5s;
        }
        #listaTarefas{
            padding: 0px;
        }
        li{
          background-color: white;
          padding: 10px;
          border-radius: 8px;
            width: 300px;
          border: cadetblue dotted 2px;
          display: flex;  
          justify-content: space-between;
          text-align: center;
          margin-left: auto;
          margin-right: auto;
        }

        .fechar{
            background-color: darkred;
            border-radius: 100px;
            border: 0px;
            color: white;
        }

        .concluida{
            text-decoration: line-through;
            color: gray;
            
        }
    </style>
</head>
<body>
    <h1>Tarefas</h1>
    <div class="input-area">
    <input id="tarefaInput" type="text" placeholder="Digite sua Tarfefa!"/>
    <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
    </ul>
</body>
</html>
