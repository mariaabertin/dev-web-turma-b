<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>

    <style>
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background: #dbd7f1;
            padding: 16px;
        }
        h1{
            color: rgb(45, 22, 66);
            text-align: center;
        }
        .inputArea{
            text-align: center;
            margin-bottom: 25px;
        }
        #tarefaInput{
            padding: 8px;
            border-radius: 15px;
            border: rgb(56, 30, 80) solid 1px;
        }
        #btnAdicionar{
            color: #dbd7f1;
            padding: 7px 10px;
            border-radius: 50px;
            border: rgb(56, 30, 80) solid 1px;
            background-color: rgb(56, 30, 80);
            cursor: pointer;
        }
        #btnAdicionar:hover{
            background-color: rgb(4, 1, 7);
            color: white;
            border: 7px;
            transition: 0.5s;
        }
        #listaTarefas{
            padding: 0px;
        }
        li{
            background-color: #b6acec;
            padding: 10px;
            margin-bottom: 12px;   
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            width: 150px;
        }
        .fechar{
            background-color: #b91e1e;
            border-radius: 100px;
            border: 0px;
            color: white;
            text-align: center;
        }
        .concluida{
            text-decoration: line-through;
            color: gray;
        }
    </style>

</head>
<body>
    <h1>Tarefas</h1>
    <div class="inputArea"> 
        <input id="tarefaInput" type="text" placeholder="Digite sua Tarefa!">
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
    </ul>
</body>
</html>
