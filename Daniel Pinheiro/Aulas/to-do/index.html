<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>
    <style>
        body {
            font-family: "arial", sans-serif;
        background: #454949;
        padding: 16px;
        }
        h1 {
            color: rgb(0, 0, 0);
            text-align: left;
        }
        .input-area {
            text-align: left;
            margin-bottom: 25px;
        }
        #tarefaInput {
            padding: 8px;
            border: 1px solid rgb(118, 219, 219);
            border-radius: 8px;
        }
        #btnAdicionar {
            padding: 6px 10px;
            color: #000000;
            background-color: rgb(113, 201, 252);
            border: 0px;
            border-radius: 8px;
            transition: 0.5s;

        }
        #btnAdicionar:hover{
            background-color: rgb(118, 219, 219);
            color: rgb(27, 171, 182);
            transition: 0.5s;
        }
        #listaTarefas {
            padding: 0px;
        }
        Li {
            background-color: rgb(255, 255, 255);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            border: rgb(90, 191, 209) dotted 2px;
            margin-bottom: 12px;
            width: 1200px;
        }
        .fechar{
            background-color: rgb(102, 2, 184);
            border-radius: 100px;
            border: 0px;
            color: white;        
        }
    </style>
</head>

<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input id="tarefaInput" type="text" placeholder="Digite uma tarefa!" />
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
    </ul>
</body>

</html>
