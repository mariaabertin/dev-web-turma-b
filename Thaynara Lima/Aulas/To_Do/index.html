<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>

    <script src="script.js"></script>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            background: #d8dbdb;
            padding: 16px;
        }
        h1 {
            color: #279292;
            text-align: center;
        }
        .input-area {
            text-align: center;
            margin-bottom: 25px;
        }
        #tarefaInput {
            padding: 8px;
            border-radius: 8px;
            border: solid #1c6e6e 1px ;
        }
        #btnAdicionar{
            padding: 8px 12px;
            color: #000000;
            background-color: #279292;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }
        #btnAdicionar:hover{
            background-color: #1c6e6e;
            color: azure;
            border: 1px;
            transition: 0.5s;
            
        }
        #listaTarefas {
            padding: 0px;
        }
        li {
            background-color: #b2c4c4;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            width: 130px;
            border: #1c6e6e ;
            display: flex;
            justify-content: space-between;
        }

        .fechar {
           background-color: rgb(131, 61, 61) ;
           border-radius: 100px;
           border: 0px;
           color: white;
           padding: 4px;
        }
        .concluida{
            text-decoration: line-through;
            color: #0b2b2b;
        }

    </style>
</head>
<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input id="tarefaInput" type="text" placeholder="Digite sua Tarefa!"/>
        <button id="btnAdicionar">+</button>
    </div>    
    <ul id="listaTarefas">
     
    </ul>


</body>
</html>
