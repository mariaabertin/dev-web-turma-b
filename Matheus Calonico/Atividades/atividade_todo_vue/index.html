<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Vue 3</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: "arial";
            background: rgb(200, 212, 228);
            padding: 16px;
        }
        h1 {
            color: cadetblue;
            text-align: left;
            font-size: 35px;
        }
        .input-area {
            text-align: start;
            margin-bottom: 25px;
            width: 300px;
            border-radius: 1em;
            border: solid white 1px;
            padding: 1em;
            background-color: #f2f2f2;
        }
        .input-area input {
            padding: 6px;
            border-radius: 8px;
            border: rgb(131, 190, 192) solid 1.5px;
            text-align: start;
        }
        .input-area button {
            padding: 6px 10px;
            color: #f2f2f2;
            background-color: lightslategray;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .input-area button:hover {
            background-color: rgb(140, 148, 155);
            transition: 0.5s;
        }
        ul {
            padding: 5px;
            list-style: none;
        }
        li {
            background-color: rgb(230, 243, 243);
            padding: 10px;
            border-radius: 8px;
            width: 130px;
            margin: 5px;
            display: flex;
            border: rgb(213, 217, 218) dotted 2px;
            justify-content: space-between;
            cursor: pointer;
        }
        .fechar {
            background-color: darkred;
            border-radius: 50vh;
            width: 1.5em;
            height: 1.5em;
            border: 0px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .concluida {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Tarefas</h1>

        <div class="input-area">
            <input type="text" placeholder="Digite sua Tarefa!" v-model="novaTarefa" @keyup.enter="adicionarTarefa">
            <button @click="adicionarTarefa">+</button>
        </div>

        <ul>
            <li
                v-for="(tarefa, index) in tarefas"
                :key="index"
                :class="{ concluida: tarefa.concluida }"
                @click="toggleConcluida(index)"
            >
                {{ tarefa.texto }}
                <button class="fechar" @click.stop="removerTarefa(index)">x</button>
            </li>
        </ul>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const novaTarefa = ref('');
                const tarefas = ref([]);

                function adicionarTarefa() {
                    const texto = novaTarefa.value.trim();
                    if (!texto) return;
                    tarefas.value.push({ texto, concluida: false });
                    novaTarefa.value = '';
                }

                function removerTarefa(index) {
                    tarefas.value.splice(index, 1);
                }

                function toggleConcluida(index) {
                    tarefas.value[index].concluida = !tarefas.value[index].concluida;
                }

                return { novaTarefa, tarefas, adicionarTarefa, removerTarefa, toggleConcluida };
            }
        }).mount('#app');
    </script>
</body>
</html>
