<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenvolvimento web</title>
    <script src="scripts.js"></script>
    <style>
    body {
        font-family: "arial";
        background: rgb(200, 212, 228);
        padding: 16px;
    }
    h1{
        color: cadetblue;
        text-align: left;
        font-size: 35px;
    
    }
    .input-area{
        text-align: start;
        margin-bottom: 25px;
        width: 300px;
        border-radius: 1em;
        border: solid white 1px;
        padding: 1em;
        background-color:#f2f2f2;
    }
    #tarefaInput{
        padding: 6px;
        border-radius: 8px;
        border: rgb(131, 190, 192) solid 1.5px;
        text-align: start;
    }
    #btnAdicionar{
        padding: 6px 10px;
        color: #f2f2f2;
        background-color: lightslategray;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
    }
    #btnAdicionar:hover{
        background-color: rgb(140, 148, 155);
        transition: 0.5s;
        color: #f2f2f2;

    }
    #listaTarefas{
        padding: 5px;
    }
    li{
        background-color: rgb(230, 243, 243);
        padding: 10px;
        border-radius: 8px;
        width: 130px;
    
        margin: 5px;
        display: flex;
        border: rgb(213, 217, 218) dotted 2px;
        justify-content: space-between;
    }
    .fechar{
        background-color: darkred;
        border-radius: 50vh;
        width: 1.5em;
        height: 1.5em;
        border: 0px;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }
    .concluida{
        text-decoration: line-through;
        color: gray;

    }
    </style>
</head>
<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input id="tarefaInput"type="text" placeholder="Digite sua Tarefa!">
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
        
    </ul>
</body>
</html>
