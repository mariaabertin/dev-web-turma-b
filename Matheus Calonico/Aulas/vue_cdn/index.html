<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue CDN Exemplo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="app.js" defer></script>

</head>
<body>
    <div id="app">
        <input type="text" placeholder="Digite algo" v-model="inputText">
        
        <p>Meu nome: {{ nome }}</p>
        <p>Minha idade: {{ idade }}</p>
        <p>Minha profissão: {{ profissao }}</p>

        <br>
        <hr>
        <br>

        <h1>Reactividade Funcioando:{{ inputText }}
        </h1>
    </div>
</body>
</html>
