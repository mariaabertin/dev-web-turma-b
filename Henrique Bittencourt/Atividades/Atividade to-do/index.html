<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade to-do</title>
    <script src="script.js"></script>
    <style>
        body{
            font-family: 'Gill Sans';
            background: #f2f2f2b0;
            padding: 16px;
        }
        
        h1{
            color: cadetblue;
            text-align: left;
        }
        .input-area{
            text-align: center;
            margin-bottom: 25px;
        }
        #tarefaInput {
            padding: 8px;
            border-radius: 8px;
            border: cadetblue solid 1px;
        }
        #btnAdicionar{
            padding: 6px 10px ;
            color: rgb(236, 184, 121);
            background-color: rgb(123, 121, 136);
            border: 0px;
            border-radius: 8px;
            cursor: pointer;
        }

        #btnAdicionar:hover{
            background-color: rgb(27, 86, 88);
            color: white;
            transition: 0.5s;
        }


        #listaTarefa{
            padding: 0px;
        }
        li{
            background-color: white;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            width: 130px;
            border: cadetblue dotted 2px;
            display: flex ;
            justify-content: space-between;
        }
        .fechar {
            background-color: darkred;
            border-radius: 100px;
            border: 0px;
            color: white;
        }   

        .concluida {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input  id="tarefaInput" type="text" placeholder="Digite sua tarefa">
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefa">
    </ul>

</body>
</html>
