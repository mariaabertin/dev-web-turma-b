<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do · Vue 3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f11;
      --surface: #1a1a1f;
      --border:  #2e2e38;
      --accent:  #b8ff57;
      --accent2: #57c4ff;
      --text:    #e8e8ec;
      --muted:   #666672;
      --done-bg: #1a1f1a;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px 80px;
    }

    #app {
      width: 100%;
      max-width: 540px;
    }

    /* ── Header ─────────────────────────────── */
    .header { margin-bottom: 36px; }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
      color: var(--text);
    }
    .header h1 span { color: var(--accent); }
    .stats {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .stats b { color: var(--accent2); }

    /* ── Input ───────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: #0f0f11;
      border: none;
      border-radius: var(--radius);
      padding: 0 20px;
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.95); }
    .btn-add:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Filters ─────────────────────────────── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .filter-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 5px 16px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f11;
    }

    /* ── Empty state ─────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

    /* ── Task list ───────────────────────────── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }

    /* ── Task item ───────────────────────────── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
      animation: slide-in 0.22s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: #3e3e4a; }
    .task-item.done  { background: var(--done-bg); opacity: 0.65; }

    .check-box {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
      background: transparent;
    }
    .task-item.done .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-icon {
      display: none;
      font-size: 0.7rem;
      color: #0f0f11;
      font-weight: 900;
    }
    .task-item.done .check-icon { display: block; }

    .task-text {
      flex: 1;
      font-size: 0.88rem;
      line-height: 1.4;
      transition: all 0.2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-remove:hover { color: #ff6b6b; background: rgba(255,107,107,0.08); }

    /* ── Clear done ──────────────────────────── */
    .footer-actions {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .btn-clear {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 16px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-clear:hover { border-color: #ff6b6b; color: #ff6b6b; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Minhas<span>Tarefas</span></h1>
    <p class="stats">
      <b>{{ pendingCount }}</b> pendente{{ pendingCount !== 1 ? 's' : '' }} ·
      {{ tasks.length }} no total
    </p>
  </div>

  <!-- Adicionar tarefa -->
  <div class="input-row">
    <input
      v-model="newTask"
      @keyup.enter="addTask"
      type="text"
      placeholder="nova tarefa..."
    />
    <button class="btn-add" @click="addTask" :disabled="!newTask.trim()">+</button>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <button
      v-for="f in filters"
      :key="f.value"
      class="filter-btn"
      :class="{ active: activeFilter === f.value }"
      @click="activeFilter = f.value"
    >
      {{ f.label }}
    </button>
  </div>

  <!-- Lista de tarefas -->
  <ul class="task-list" v-if="filteredTasks.length > 0">
    <li
      v-for="task in filteredTasks"
      :key="task.id"
      class="task-item"
      :class="{ done: task.done }"
    >
      <div class="check-box" @click="toggleTask(task)">
        <span class="check-icon">✓</span>
      </div>
      <span class="task-text">{{ task.text }}</span>
      <button class="btn-remove" @click="removeTask(task.id)" title="Remover">✕</button>
    </li>
  </ul>

  <!-- Estado vazio -->
  <div class="empty" v-else>
    <div class="empty-icon">📋</div>
    <p>nenhuma tarefa aqui.</p>
  </div>

  <!-- Limpar concluídas -->
  <div class="footer-actions" v-if="tasks.some(t => t.done)">
    <button class="btn-clear" @click="clearDone">limpar concluídas</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
