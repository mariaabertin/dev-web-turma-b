<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>
    <style>
        body {
            font-family: "arial", sans-serif;
        background: #cea22a;
        padding: 16px;
        }
        h1 {
            color: rgb(0, 0, 0);
            text-align: left;
        }
        .input-area {
            text-align: left;
            margin-bottom: 25px;
        }
        #tarefaInput {
            padding: 8px;
            border: 1px solid rgb(15, 14, 11);
            border-radius: 8px;
        }
        #btnAdicionar {
            padding: 6px 10px;
            color: #000000;
            background-color: rgb(86, 100, 109);
            border: 0px;
            border-radius: 8px;
            transition: 0.5s;

        }
        #btnAdicionar:hover{
            background-color: rgb(214, 214, 214);
            color: rgb(16, 25, 26);
            transition: 0.5s;
        }
        #listaTarefas {
            padding: 0px;
        }
        Li {
            background-color: rgb(255, 255, 255);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            border: rgb(7, 10, 10) dotted 2px;
            margin-bottom: 12px;
            width: 1200px;
        }
        .fechar{
            background-color: darkred;
            border-radius: 100px;
            border: 0px;
            color: white;        
        }
    </style>
</head>

<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input id="tarefaInput" type="text" placeholder="Digite uma tarefa!" />
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
    </ul>
</body>

</html>
