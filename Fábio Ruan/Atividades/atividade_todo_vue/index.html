<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px; font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #42b883;
            color: white; border: none;
            border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #369870; }
        ul { list-style: none; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .btn-concluir { background-color: #4a90d9; margin-right: 5px; }
        .btn-remover { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>Lista de Tarefas</h1>
            <div class="input-area">
                <input type="text" v-model="novaTarefa" placeholder="Digite uma tarefa...">
                <button @click="adicionarTarefa">Adicionar</button>
            </div>
            <ul>
                <!-- as tarefas vao aparecer aqui -->
            </ul>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    novaTarefa: "",
                    tarefas: ""
                }
            },
            methods: {
                adicionarTarefa() {
                    console.log(this.novaTarefa)
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
